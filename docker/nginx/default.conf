server {
    listen 80;
    server_name localhost;
    root /app/public;

    # Add trailing slash to /admin and /profiler paths
    rewrite ^/(admin|profiler)$ /$1/ permanent;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Serve profiler assets correctly
    location ^~ /_(profiler|wdt) {
        try_files $uri =404;
    }

    # Serve static assets
    location ~* \.(css|js|ico|jpg|jpeg|png|gif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # Handle Symfony front controller
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 300;
        internal;
    }

    # Return 404 for any other PHP files
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}