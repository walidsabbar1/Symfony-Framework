services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/app:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - symfony

  php:
    image: php:8.2-fpm-alpine
    working_dir: /app
    volumes:
      - .:/app:delegated
    networks:
      - symfony
    depends_on:
      - database
    environment:
      PHP_MEMORY_LIMIT: 512M
    # Install MySQL PDO extension
    command: sh -c "docker-php-ext-install pdo_mysql && php-fpm"

  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: symfonyapp
      MYSQL_PASSWORD: '!ChangeMe!'
      MYSQL_USER: app
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - database_data:/var/lib/mysql:delegated
    ports:
      - "3306:3306"
    networks:
      - symfony

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    depends_on:
      - database
    networks:
      - symfony

volumes:
  database_data:

networks:
  symfony: